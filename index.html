<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapai Fuel - চাঁপাইনবাবগঞ্জের জ্বালানি আপডেট</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .pump-card {
            transition: transform 0.2s;
        }
        .pump-card:hover {
            transform: translateY(-2px);
        }
        .status-available {
            background-color: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        .status-unavailable {
            background-color: #ef4444;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #f97316;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- হেডার -->
    <header class="bg-gradient-to-r from-orange-600 to-red-600 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center flex-wrap gap-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold">⛽ Chapai Fuel</h1>
                    <p class="text-sm opacity-90">চাঁপাইনবাবগঞ্জের জ্বালানি তেলের বর্তমান অবস্থা</p>
                </div>
                <div class="flex gap-2">
                    <a href="index.html" class="px-4 py-2 bg-white text-orange-600 rounded-lg font-semibold shadow-md">
                        📋 লিস্ট ভিউ
                    </a>
                    <a href="map.html" class="px-4 py-2 bg-orange-500 rounded-lg hover:bg-orange-700 transition shadow-md">
                        🗺️ ম্যাপ ভিউ
                    </a>
                </div>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-6">
        <!-- স্ট্যাটাস কার্ড -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <i class="fas fa-gas-pump text-3xl text-orange-600"></i>
                <p class="text-2xl font-bold" id="totalPumps">0</p>
                <p class="text-sm text-gray-600">মোট পাম্প</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <i class="fas fa-check-circle text-3xl text-green-600"></i>
                <p class="text-2xl font-bold" id="availablePumps">0</p>
                <p class="text-sm text-gray-600">সক্রিয় পাম্প</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <i class="fas fa-clock text-3xl text-blue-600"></i>
                <p class="text-2xl font-bold" id="todayUpdate">0</p>
                <p class="text-sm text-gray-600">আজকে আপডেট</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <i class="fas fa-map-marker-alt text-3xl text-purple-600"></i>
                <p class="text-2xl font-bold" id="upazilaCount">5</p>
                <p class="text-sm text-gray-600">উপজেলা</p>
            </div>
        </div>

        <!-- ফিল্টার সেকশন -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <select id="upazilaFilter" class="border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-orange-500">
                    <option value="">📌 সব উপজেলা</option>
                    <option value="সদর">সদর</option>
                    <option value="শিবগঞ্জ">শিবগঞ্জ</option>
                    <option value="গোমস্তাপুর">গোমস্তাপুর</option>
                    <option value="নাচোল">নাচোল</option>
                    <option value="ভোলাহাট">ভোলাহাট</option>
                </select>
                
                <select id="fuelFilter" class="border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-orange-500">
                    <option value="">⛽ সব জ্বালানি</option>
                    <option value="petrol">পেট্রোল</option>
                    <option value="diesel">ডিজেল</option>
                    <option value="octane">অকটেন</option>
                </select>
                
                <input type="text" id="searchInput" placeholder="🔍 পাম্পের নাম খুঁজুন..." 
                       class="border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-orange-500">
            </div>
        </div>
        
        <!-- পাম্পের তালিকা -->
        <div id="pumpsList" class="space-y-4">
            <div class="text-center py-10">
                <div class="loading-spinner"></div>
                <p class="mt-4 text-gray-500">ডাটা লোড হচ্ছে...</p>
            </div>
        </div>
    </div>

    <script>
        // আপনার Google Sheets ID এবং API Key
        const SPREADSHEET_ID = '1fsJx1S2AadU9KJzkwhAGYvAXN662o5YL8lE2V3dzQ2g';
        const API_KEY = 'AIzaSyCUThG9UZmR_587jy5WTzc0zBfdhuu_IUc';
        const SHEET_NAME = 'Sheet1';
        
        let allPumps = [];
        
        async function loadFromGoogleSheets() {
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}?key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (!data.values || data.values.length <= 1) {
                    document.getElementById('pumpsList').innerHTML = `
                        <div class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded-lg">
                            <i class="fas fa-exclamation-triangle"></i> 
                            এখনো কোনো ডাটা যোগ করা হয়নি। 
                            <a href="https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/edit" target="_blank" 
                               class="text-blue-600 underline font-semibold">Google Sheets-এ ক্লিক করে ডাটা যোগ করুন</a>
                        </div>
                    `;
                    return;
                }
                
                const rows = data.values.slice(1);
                allPumps = rows.filter(row => row[1]).map(row => ({
                    id: row[0],
                    name: row[1],
                    upazila: row[2],
                    address: row[3] || '',
                    lat: parseFloat(row[4]) || 0,
                    lng: parseFloat(row[5]) || 0,
                    petrol_stock: row[6] || 'unavailable',
                    petrol_price: row[7] || '',
                    diesel_stock: row[8] || 'unavailable',
                    diesel_price: row[9] || '',
                    octane_stock: row[10] || 'unavailable',
                    octane_price: row[11] || '',
                    line_status: row[12] || 'no_line',
                    last_updated: row[13] || new Date().toISOString(),
                    verified: row[14] === 'true'
                }));
                
                updateStatistics();
                displayPumps(allPumps);
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('pumpsList').innerHTML = `
                    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg">
                        <i class="fas fa-times-circle"></i> 
                        ডাটা লোড করতে সমস্যা হয়েছে। <br>
                        <small class="text-sm">API Key বা Sheet ID চেক করুন।</small>
                    </div>
                `;
            }
        }
        
        function updateStatistics() {
            document.getElementById('totalPumps').textContent = allPumps.length;
            
            const available = allPumps.filter(pump => 
                pump.petrol_stock === 'available' || 
                pump.diesel_stock === 'available' || 
                pump.octane_stock === 'available'
            ).length;
            document.getElementById('availablePumps').textContent = available;
            
            const today = new Date().toDateString();
            const todayUpdated = allPumps.filter(pump => {
                const updateDate = new Date(pump.last_updated).toDateString();
                return updateDate === today;
            }).length;
            document.getElementById('todayUpdate').textContent = todayUpdated;
        }
        
        function displayPumps(pumps) {
            const container = document.getElementById('pumpsList');
            
            if (pumps.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-10">🔍 কোন পাম্প পাওয়া যায়নি</div>';
                return;
            }
            
            container.innerHTML = pumps.map(pump => `
                <div class="bg-white rounded-lg shadow-md pump-card overflow-hidden">
                    <div class="border-l-4 ${getBorderColor(pump)} p-5">
                        <div class="flex justify-between items-start flex-wrap gap-2 mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-gray-800">⛽ ${pump.name}</h3>
                                <p class="text-gray-600 text-sm mt-1">
                                    <i class="fas fa-map-marker-alt text-red-500"></i> ${pump.upazila} উপজেলা
                                </p>
                            </div>
                            ${pump.verified ? '<span class="bg-blue-500 text-white px-3 py-1 rounded-full text-xs"><i class="fas fa-check-circle"></i> যাচাইকৃত</span>' : ''}
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
                            ${renderFuelCard('পেট্রোল', pump.petrol_stock, pump.petrol_price)}
                            ${renderFuelCard('ডিজেল', pump.diesel_stock, pump.diesel_price)}
                            ${renderFuelCard('অকটেন', pump.octane_stock, pump.octane_price)}
                        </div>
                        
                        <div class="flex justify-between items-center text-sm border-t pt-3 mt-2">
                            <div class="text-gray-500">
                                <i class="far fa-clock"></i> শেষ আপডেট: ${getTimeAgo(pump.last_updated)}
                            </div>
                            <div>
                                <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs ${getLineClass(pump.line_status)}">
                                    ${getLineIcon(pump.line_status)} ${getLineText(pump.line_status)}
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderFuelCard(fuelName, stock, price) {
            const isAvailable = stock === 'available';
            const statusClass = isAvailable ? 'status-available' : 'status-unavailable';
            const statusText = isAvailable ? '✓ আছে' : '✗ নেই';
            const priceText = price ? `৳${price}` : '';
            
            return `
                <div class="text-center p-3 bg-gray-50 rounded-lg">
                    <div class="font-bold text-gray-700">${fuelName}</div>
                    <div class="${statusClass} mt-2">${statusText}</div>
                    ${priceText ? `<div class="text-sm font-semibold mt-1">${priceText}</div>` : ''}
                </div>
            `;
        }
        
        function getBorderColor(pump) {
            const hasFuel = pump.petrol_stock === 'available' || 
                           pump.diesel_stock === 'available' || 
                           pump.octane_stock === 'available';
            return hasFuel ? 'border-green-500' : 'border-red-500';
        }
        
        function getLineText(status) {
            const lines = {
                'no_line': 'কোন লাইন নেই',
                'small_line': 'ছোট লাইন',
                'big_line': 'বড় লাইন'
            };
            return lines[status] || 'তথ্য নেই';
        }
        
        function getLineIcon(status) {
            const icons = {
                'no_line': '✅',
                'small_line': '⚠️',
                'big_line': '🔴'
            };
            return icons[status] || '❓';
        }
        
        function getLineClass(status) {
            const classes = {
                'no_line': 'bg-green-100 text-green-700',
                'small_line': 'bg-yellow-100 text-yellow-700',
                'big_line': 'bg-red-100 text-red-700'
            };
            return classes[status] || 'bg-gray-100 text-gray-700';
        }
        
        function getTimeAgo(dateString) {
            if (!dateString) return 'কিছুক্ষণ আগে';
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            
            if (seconds < 60) return `${seconds} সেকেন্ড আগে`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)} মিনিট আগে`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)} ঘন্টা আগে`;
            return `${Math.floor(seconds / 86400)} দিন আগে`;
        }
        
        // ফিল্টার ফাংশন
        function filterPumps() {
            const upazila = document.getElementById('upazilaFilter').value;
            const fuelType = document.getElementById('fuelFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allPumps;
            
            if (upazila) {
                filtered = filtered.filter(p => p.upazila === upazila);
            }
            
            if (fuelType) {
                filtered = filtered.filter(p => {
                    if (fuelType === 'petrol') return p.petrol_stock === 'available';
                    if (fuelType === 'diesel') return p.diesel_stock === 'available';
                    if (fuelType === 'octane') return p.octane_stock === 'available';
                    return true;
                });
            }
            
            if (search) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(search) || 
                    p.upazila.toLowerCase().includes(search)
                );
            }
            
            displayPumps(filtered);
        }
        
        // ইভেন্ট লিসেনার
        document.getElementById('upazilaFilter').addEventListener('change', filterPumps);
        document.getElementById('fuelFilter').addEventListener('change', filterPumps);
        document.getElementById('searchInput').addEventListener('input', filterPumps);
        
        // পেজ লোড হলে ডাটা লোড
        loadFromGoogleSheets();
        
        // প্রতি 5 মিনিটে ডাটা রিফ্রেশ
        setInterval(loadFromGoogleSheets, 300000);
    </script>
</body>
</html>
